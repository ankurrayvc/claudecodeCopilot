<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Claude Code Terminal</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: #1e1e1e;
      font-family: monospace;
      overflow: hidden;
    }

    #header {
      height: 42px;
      background: #2d2d2d;
      color: #e0e0e0;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      border-bottom: 1px solid #444;
      font-size: 13px;
      box-sizing: border-box;
    }

    #status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ff4444;
      flex-shrink: 0;
    }

    #status-dot.connected {
      background: #44ff44;
    }

    #terminal-container {
      height: calc(100vh - 42px);
      width: 100vw;
      padding: 8px;
      box-sizing: border-box;
      overflow: hidden;
    }
  </style>
</head>

<body>
  <div id="header">
    <div id="status-dot"></div>
    <span id="status-text">Connecting to Claude Code terminal...</span>
  </div>

  <div id="terminal-container"></div>

  <script>
    const statusDot = document.getElementById("status-dot");
    const statusText = document.getElementById("status-text");

    function setStatus(text, connected) {
      statusText.textContent = text;

      if (connected) {
        statusDot.classList.add("connected");
      } else {
        statusDot.classList.remove("connected");
      }
    }

    if (typeof Terminal === "undefined") {
      setStatus("xterm.js failed to load", false);
      throw new Error("xterm.js failed to load");
    }

    if (typeof FitAddon === "undefined") {
      setStatus("xterm fit addon failed to load", false);
      throw new Error("xterm fit addon failed to load");
    }

    const term = new Terminal({
      cursorBlink: true,
      fontSize: 14,
      convertEol: true,
      theme: {
        background: "#1e1e1e",
        foreground: "#d4d4d4",
        cursor: "#ffffff",
        selection: "#264f78",
        black: "#000000",
        red: "#cd3131",
        green: "#0dbc79",
        yellow: "#e5e510",
        blue: "#2472c8",
        magenta: "#bc3fbc",
        cyan: "#11a8cd",
        white: "#e5e5e5"
      }
    });

    const fitAddon = new FitAddon.FitAddon();

    term.loadAddon(fitAddon);
    term.open(document.getElementById("terminal-container"));

    setTimeout(() => {
      fitAddon.fit();
    }, 100);

    term.writeln("\x1b[33mOpening Claude Code terminal WebSocket...\x1b[0m");

    const wsUrl = "wss://snowcap-refract-backlight.ngrok-free.dev/terminal-ws";
    const ws = new WebSocket(wsUrl);

    ws.onopen = () => {
      setStatus("Claude Code terminal connected", true);

      term.writeln("\x1b[32mConnected to Claude Code terminal\x1b[0m");
      term.writeln("");
      term.writeln("Try:");
      term.writeln("pwd");
      term.writeln("which claude");
      term.writeln("claude");
      term.writeln("");
    };

    ws.onmessage = (event) => {
      try {
        const msg = JSON.parse(event.data);

        if (msg.type === "output") {
          term.write(msg.data);
        }
      } catch (error) {
        term.write(event.data);
      }
    };

    ws.onclose = () => {
      setStatus("Disconnected", false);
      term.writeln("");
      term.writeln("\x1b[31mConnection closed.\x1b[0m");
    };

    ws.onerror = () => {
      setStatus("WebSocket error", false);
      term.writeln("");
      term.writeln("\x1b[31mWebSocket error. Check MCP server and ngrok.\x1b[0m");
    };

    term.onData((data) => {
      if (ws.readyState === WebSocket.OPEN) {
        ws.send(
          JSON.stringify({
            type: "input",
            data: data
          })
        );
      }
    });

    window.addEventListener("resize", () => {
      fitAddon.fit();

      if (ws.readyState === WebSocket.OPEN) {
        ws.send(
          JSON.stringify({
            type: "resize",
            cols: term.cols,
            rows: term.rows
          })
        );
      }
    });
  </script>
</body>
</html>
